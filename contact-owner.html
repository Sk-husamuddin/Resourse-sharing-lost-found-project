<!DOCTYPE html>
<html>
<head>
    <title>Contact Owner - Resource Sharing Hub</title>
    <link href="css/contact-owner.css" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="logo-div">
            <h2 class="logo-text">🔗 Resource Hub</h2>
        </div>
        <div class="right-section"> 
            <div class="user-info">
                <span>Welcome User</span>
                <a href="welcome.html" class="logout-btn">Logout</a>
            </div>
        </div>
    </header>

    <div class="main-container">
        <!-- Left Sidebar with Icons -->
        <aside class="sidebar">
            <div class="icon-container">
                <a href="dashboard.html" class="icon-item-link">
                    <div class="icon-item">
                        <img src="assets/shopping-cart.png" alt="Resource Sharing" class="nav-icon">
                        <span class="icon-label">Resources</span>
                    </div>
                </a>
                <a href="lost-found.html" class="icon-item-link">
                    <div class="icon-item">
                        <img src="assets/key.png" alt="Lost & Found" class="nav-icon">
                        <span class="icon-label">Lost & Found</span>
                    </div>
                </a>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <div class="contact-container">
                <div class="contact-header">
                    <h1 class="contact-title">Contact Resource Owner</h1>
                    <p class="contact-subtitle">Get in touch with the resource owner to borrow or learn more</p>
                </div>

                <!-- Contact Form -->
                <div class="contact-form-container">
                    <form class="contact-form" action="dashboard.html">
                        <div class="form-group">
                            <label class="form-label" for="your-name">Your Name *</label>
                            <input type="text" id="your-name" name="your-name" class="form-input" placeholder="Enter your full name" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="your-email">Your Email *</label>
                            <input type="email" id="your-email" name="your-email" class="form-input" placeholder="your.email@example.com" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="your-phone">Your Phone Number</label>
                            <input type="tel" id="your-phone" name="your-phone" class="form-input" placeholder="+91 98765 43210">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="message">Message *</label>
                            <textarea id="message" name="message" class="form-input" rows="5" placeholder="Hi, I'm interested in this resource. Please let me know when it's available for borrowing..." required></textarea>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="availability">When do you need it?</label>
                            <select id="availability" name="availability" class="form-input">
                                <option value="">Select timeframe</option>
                                <option value="immediately">Immediately</option>
                                <option value="this-week">This week</option>
                                <option value="next-week">Next week</option>
                                <option value="this-month">This month</option>
                                <option value="flexible">Flexible</option>
                            </select>
                        </div>

                        <div class="form-actions">
                            <a href="dashboard.html" class="cancel-btn">Go Back</a>
                            <button type="submit" class="submit-btn">Send Message</button>
                        </div>
                    </form>
                </div>

            </div>
        </main>
    </div>

</body>
</html>
